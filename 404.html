<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="页面未找到 - 404 错误">
    <meta name="keywords" content="404, 页面未找到, 错误">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>页面未找到 | 404 错误</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <!-- 导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-md z-50 transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600 dark:text-blue-400">我的网站</a>
            
            <!-- 深色模式切换 -->
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                <i class="fa fa-moon-o dark:hidden" aria-hidden="true"></i>
                <i class="fa fa-sun-o hidden dark:block" aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <!-- 404 错误页面 -->
    <section class="error-404 pt-32 pb-16">
        <div class="container mx-auto px-4">
            <h1 class="text-5xl md:text-7xl font-bold mb-6">404</h1>
            <h2 class="text-2xl md:text-3xl mb-8">页面未找到</h2>
            <p class="text-lg text-gray-600 dark:text-gray-300 mb-12 max-w-2xl">
                抱歉，您访问的页面不存在或已被移除。请检查您输入的网址是否正确，或返回首页继续浏览。
            </p>
            <a href="index.html" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-all transform hover:scale-105">
                返回首页
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 bg-gray-100 dark:bg-gray-800">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <p class="text-gray-600 dark:text-gray-300">© 2026 我的静态网站. 保留所有权利.</p>
                </div>
                <div class="flex space-x-4">
                    <a href="https://github.com" target="_blank" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                        <i class="fa fa-github" aria-hidden="true"></i>
                    </a>
                    <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                        <i class="fa fa-arrow-up" aria-hidden="true"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
