<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="王一止的博客 - 技术分享与学习笔记">
    <meta name="keywords" content="博客, 技术, 学习笔记, 个人博客">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>博客 | 王一止</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 视频背景 */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -2;
            object-fit: cover;
        }
        /* 深色遮罩层，让白色背景变暗以突出前景 */
        #bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
        /* 暗色毛玻璃卡片 */
        .glass-card {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* 文章列表项 */
        .post-item {
            transition: all 0.35s ease;
        }
        .post-item:hover {
            transform: translateY(-4px);
            background: rgba(30, 30, 50, 0.85);
            border-color: rgba(100, 140, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        /* 标签 */
        .tag {
            transition: background 0.2s;
        }
        /* 导航栏 - 半透明 */
        .nav-glass {
            background: rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        /* 覆盖主页的白色滚动样式，保持暗色毛玻璃 */
        header.scrolled {
            background: rgba(10, 10, 20, 0.75) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4) !important;
        }
        /* 背景切换器 */
        .bg-switcher { position: relative; }
        .bg-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.25s ease;
            z-index: 100;
        }
        .bg-switcher.open .bg-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .bg-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .bg-option:hover { background: rgba(255, 255, 255, 0.08); }
        .bg-option.active { background: rgba(99, 130, 255, 0.2); }
        .bg-option .bg-thumb {
            width: 36px;
            height: 20px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .bg-option .bg-name {
            font-size: 13px;
            color: #e0e0e0;
            white-space: nowrap;
        }
        .bg-option.active .bg-name { color: #93bbfd; }
        /* 透明度调节器 */
        .opacity-panel { position: relative; }
        .opacity-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            min-width: 220px;
            opacity: 0; visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.25s ease;
            z-index: 100;
        }
        .opacity-panel.open .opacity-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .opacity-dropdown label { font-size: 12px; color: #aaa; display: block; margin-bottom: 6px; }
        .opacity-dropdown input[type="range"] {
            width: 100%;
            accent-color: #6382ff;
            cursor: pointer;
        }
        .opacity-dropdown .op-row { margin-bottom: 14px; }
        .opacity-dropdown .op-row:last-child { margin-bottom: 0; }
        .opacity-dropdown .op-val { font-size: 11px; color: #93bbfd; float: right; margin-top: -18px; }
        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        /* 分类按钮 */
        .filter-btn {
            transition: all 0.25s ease;
        }
        .filter-btn.active {
            background: rgba(99, 130, 255, 0.3);
            border-color: rgba(99, 130, 255, 0.6);
            color: #93bbfd;
        }
        .filter-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }
        /* 统计卡片 */
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            background: rgba(30, 30, 50, 0.85);
            transform: translateY(-2px);
        }
        /* 加载动画 */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <!-- 背景视频 -->
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="./sources/[NK]BITTER-SPICE_live wallpaper.mp4" type="video/mp4">
    </video>
    <div id="bg-overlay"></div>

    <!-- 导航栏 -->
    <header class="fixed top-0 left-0 right-0 nav-glass z-50 py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors duration-300 flex items-center gap-2">

                <!-- 透明度调节按钮 -->
                <div class="opacity-panel" id="opacity-panel">

                    <div class="opacity-dropdown" id="opacity-dropdown">

                            <input type="range" id="blur-slider" min="0" max="40" value="16">

                <!-- 背景切换按钮 -->
                <div class="bg-switcher" id="bg-switcher">

                        <i class="fa fa-image" aria-hidden="true"></i>

            </div>
            </div>
            <!-- 移动端菜单按钮 -->

                <i class="fa fa-bars text-gray-300" aria-hidden="true"></i>
            </button>
        </div>
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="md:hidden hidden nav-glass border-b border-white/5">
            <div class="container mx-auto px-6 py-4 flex flex-col space-y-3">
                <a href="index.html" class="text-gray-300 hover:text-white py-2">返回首页</a>
            </div>
        </div>

    <!-- 主体内容 -->
    <main class="pt-24 pb-20">
        <div class="container mx-auto px-6 max-w-5xl">

            <!-- 博客文章区域 -->

                    </div>

                        <div class="text-2xl font-bold text-gray-400" id="stat-categories">0</div>
                        <div class="text-xs text-gray-500 mt-1">项目分类</div>
                    </div>

                <!-- 项目列表 -->

                            <div class="flex-1 space-y-3 py-1">

    <script src="js/main.js"></script>
    <script>
        // 移动端菜单
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // ========== 背景视频切换 ==========
        var bgVideos = [
            { name: 'BITTER-SPICE', file: '[NK]BITTER-SPICE_live wallpaper.mp4', icon: '✨' },
            { name: 'AMY 4K',       file: 'AMY 4K.mp4',             icon: '🎬' },
            { name: 'Chill Cat',    file: 'Chill Cat Coffe.mp4',    icon: '🐱' },
            { name: 'bizhi',        file: 'bizhi.mp4',              icon: '️' }
        ];
        var bgSwitcher = document.getElementById('bg-switcher');
        var bgDropdown = document.getElementById('bg-dropdown');
        var bgVideo = document.getElementById('bg-video');
        var currentBg = localStorage.getItem('blog-bg') || 0;

        function renderBgOptions() {
            var html = '';
            bgVideos.forEach(function(v, i) {
                html += '<div class="bg-option ' + (i == currentBg ? 'active' : '') + '" data-idx="' + i + '">'
                    + '  <div class="bg-thumb">' + v.icon + '</div>'
                    + '  <span class="bg-name">' + v.name + '</span>'
                    + '</div>';
            });
            bgDropdown.innerHTML = html;
            bgDropdown.querySelectorAll('.bg-option').forEach(function(el) {
                el.addEventListener('click', function() {
                    currentBg = parseInt(this.dataset.idx);
                    localStorage.setItem('blog-bg', currentBg);
                    bgVideo.src = './sources/video/' + bgVideos[currentBg].file;
                    bgVideo.load();
                    bgVideo.play();
                    renderBgOptions();
                    bgSwitcher.classList.remove('open');
                });
            });
        }

        // 初始化背景
        bgVideo.src = './sources/video/' + bgVideos[currentBg].file;
        renderBgOptions();

        // 切换下拉菜单
        bgSwitcher.querySelector('button').addEventListener('click', function(e) {
            e.stopPropagation();
            bgSwitcher.classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
            if (!bgSwitcher.contains(e.target)) { bgSwitcher.classList.remove('open'); }
            if (!document.getElementById('opacity-panel').contains(e.target)) { document.getElementById('opacity-panel').classList.remove('open'); }
        });

        // ========== 透明度调节 ==========
        var ovSlider = document.getElementById('ov-slider');
        var cardSlider = document.getElementById('card-slider');
        var blurSlider = document.getElementById('blur-slider');
        var bgOverlay = document.getElementById('bg-overlay');

        function applyOpacity() {
            var ov = ovSlider.value / 100;
            var card = cardSlider.value / 100;
            var blur = blurSlider.value;
            document.getElementById('ov-val').textContent = Math.round(ov * 100) + '%';
            document.getElementById('card-val').textContent = Math.round(card * 100) + '%';
            document.getElementById('blur-val').textContent = blur + 'px';
            bgOverlay.style.background = 'rgba(0,0,0,' + ov.toFixed(2) + ')';
            localStorage.setItem('blog-ov', ovSlider.value);
            localStorage.setItem('blog-card', cardSlider.value);
            localStorage.setItem('blog-blur', blurSlider.value);
            // 更新所有 glass-card 和 nav-glass
            var blurCSS = blur + 'px';
            document.querySelectorAll('.glass-card').forEach(function(el) {
                el.style.background = 'rgba(20,20,30,' + card.toFixed(2) + ')';
                el.style.backdropFilter = 'blur(' + blurCSS + ')';
                el.style.webkitBackdropFilter = 'blur(' + blurCSS + ')';
            });
            document.querySelectorAll('.nav-glass').forEach(function(el) {
                el.style.backdropFilter = 'blur(' + blurCSS + ')';
                el.style.webkitBackdropFilter = 'blur(' + blurCSS + ')';
            });
        }
        ovSlider.addEventListener('input', applyOpacity);
        cardSlider.addEventListener('input', applyOpacity);
        blurSlider.addEventListener('input', applyOpacity);

        // 从 localStorage 恢复
        var savedOv = localStorage.getItem('blog-ov');
        var savedCard = localStorage.getItem('blog-card');
        var savedBlur = localStorage.getItem('blog-blur');
        if (savedOv) ovSlider.value = savedOv;
        if (savedCard) cardSlider.value = savedCard;
        if (savedBlur) blurSlider.value = savedBlur;
        applyOpacity();

        // 打开面板
        document.getElementById('opacity-panel').querySelector('button').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('opacity-panel').classList.toggle('open');
        });

        // ========== Tab 切换 ==========
        var currentTab = 'posts';
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                currentTab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(function(b) {
                    b.classList.remove('bg-blue-500/30', 'text-white');
                    b.classList.add('text-gray-400');
                });
                this.classList.add('bg-blue-500/30', 'text-white');
                this.classList.remove('text-gray-400');
                document.getElementById('tab-posts').classList.toggle('hidden', currentTab !== 'posts');
                document.getElementById('tab-projects').classList.toggle('hidden', currentTab !== 'projects');
            });
        });

        // ========== 项目列表加载 ==========
        var allProjects = [];
        var activeProjectFilter = 'all';

        var projectCoverConfig = {
            code:    { icon: 'fa-code',    gradient: 'from-blue-500/30 to-violet-500/30',   iconColor: 'text-blue-300' },
            book:    { icon: 'fa-book',    gradient: 'from-emerald-500/30 to-teal-500/30',  iconColor: 'text-emerald-300' },
            heart:   { icon: 'fa-heart',   gradient: 'from-orange-500/30 to-red-500/30',    iconColor: 'text-orange-300' },
            gear:    { icon: 'fa-gear',    gradient: 'from-gray-500/30 to-gray-400/30',     iconColor: 'text-gray-300' },
            rocket:  { icon: 'fa-rocket',  gradient: 'from-amber-500/30 to-orange-500/30',  iconColor: 'text-amber-300' },
            music:   { icon: 'fa-music',   gradient: 'from-pink-500/30 to-rose-500/30',     iconColor: 'text-pink-300' },
            default: { icon: 'fa-folder',  gradient: 'from-violet-500/30 to-purple-500/30', iconColor: 'text-violet-300' }
        };

        var projectTagColors = {
            'Vue3': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
            'Node.js': 'bg-green-500/20 text-green-400 border-green-500/30',
            'MySQL': 'bg-orange-500/20 text-orange-400 border-orange-500/30',
            'Python': 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
            'React': 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
            'HTML5': 'bg-red-500/20 text-red-400 border-red-500/30',
            'TailwindCSS': 'bg-sky-500/20 text-sky-400 border-sky-500/30',
            'JavaScript': 'bg-amber-500/20 text-amber-400 border-amber-500/30',
            'OpenCV': 'bg-teal-500/20 text-teal-400 border-teal-500/30',
            'PyTorch': 'bg-rose-500/20 text-rose-400 border-rose-500/30',
            '图像增强': 'bg-violet-500/20 text-violet-400 border-violet-500/30'
        };

        function getProjectTagClass(tag) {
            return projectTagColors[tag] || 'bg-gray-500/20 text-gray-400 border-gray-500/30';
        }

        function getProjectCover(cfg) {
            return projectCoverConfig[cfg] || projectCoverConfig['default'];
        }

        function renderProjectCard(project) {
            var cover = getProjectCover(project.cover);
            var tagsHtml = (project.tags || []).map(function(tag) {
                return '<span class="px-2 py-0.5 text-xs rounded-full border ' + getProjectTagClass(tag) + '">' + tag + '</span>';
            }).join('');

            var statusClass = project.status === '已完成' ? 'text-green-400' : (project.status === '开发中' ? 'text-yellow-400' : 'text-gray-400');
            var statusIcon = project.status === '已完成' ? 'fa-check-circle' : (project.status === '开发中' ? 'fa-code' : 'fa-clock');

            return '<article class="post-item glass-card rounded-xl p-5 cursor-pointer">'
                + '  <a href="project.html?slug=' + project.slug + '" class="flex flex-col sm:flex-row sm:items-start gap-4">'
                + '    <div class="flex-shrink-0 w-full sm:w-44 h-28 bg-gradient-to-br ' + cover.gradient + ' rounded-lg flex items-center justify-center">'
                + '      <i class="fa ' + cover.icon + ' text-3xl ' + cover.iconColor + '"></i>'
                + '    </div>'
                + '    <div class="flex-1 min-w-0">'
                + '      <div class="flex items-center flex-wrap gap-2 mb-2">'
                + '        <span class="text-xs px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30">' + project.category + '</span>'
                + '        <span class="text-xs ' + statusClass + '"><i class="fa ' + statusIcon + '"></i> ' + project.status + '</span>'
                +         tagsHtml
                + '        <span class="text-xs text-gray-600">' + project.date + '</span>'
                + '      </div>'
                + '      <h2 class="text-lg font-semibold text-white mb-1.5">' + project.title + '</h2>'
                + '      <p class="text-gray-500 text-sm line-clamp-2">' + (project.summary || '') + '</p>'
                + '    </div>'
                + '  </a>'
                + '</article>';
        }

        function getFilteredProjects() {
            return allProjects.filter(function(project) {
                return activeProjectFilter === 'all' || project.category === activeProjectFilter;
            });
        }

        function renderProjects() {
            var listEl = document.getElementById('projects-list');
            var emptyEl = document.getElementById('projects-empty-state');
            var filtered = getFilteredProjects();

            if (filtered.length === 0) {
                listEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
                return;
            }
            emptyEl.classList.add('hidden');
            listEl.innerHTML = filtered.map(renderProjectCard).join('');
        }

        function renderProjectFilters() {
            var bar = document.getElementById('project-filter-bar');
            var categories = new Set();
            allProjects.forEach(function(p) { categories.add(p.category); });
            var catsArr = Array.from(categories);

            var html = '<button class="filter-btn px-4 py-1.5 rounded-full text-sm border border-white/10 ' + (activeProjectFilter === 'all' ? 'active' : '') + '" data-filter="all">全部</button>';
            catsArr.forEach(function(cat) {
                html += '<button class="filter-btn px-4 py-1.5 rounded-full text-sm border border-white/10 ' + (activeProjectFilter === cat ? 'active' : '') + '" data-filter="' + cat + '">' + cat + '</button>';
            });
            bar.innerHTML = html;

            bar.querySelectorAll('.filter-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    activeProjectFilter = this.dataset.filter;
                    renderProjectFilters();
                    renderProjects();
                });
            });
        }

        function updateProjectStats() {
            document.getElementById('stat-projects').textContent = allProjects.length;
            document.getElementById('stat-completed').textContent = allProjects.filter(function(p) { return p.status === '已完成'; }).length;
            document.getElementById('stat-dev').textContent = allProjects.filter(function(p) { return p.status === '开发中'; }).length;
            var categories = new Set();
            allProjects.forEach(function(p) { categories.add(p.category); });
            document.getElementById('stat-categories').textContent = categories.size;
        }

        // 加载项目数据
        fetch('projects/projects.json?t=' + Date.now())
            .then(function(res) {
                if (!res.ok) throw new Error('加载失败');
                return res.json();
            })
            .then(function(projects) {
                allProjects = projects;
                updateProjectStats();
                renderProjectFilters();
                renderProjects();
            })
            .catch(function() {
                document.getElementById('projects-list').innerHTML = '<div class="text-center py-16"><p class="text-gray-500">项目列表加载失败</p></div>';
            });

        // ========== 博客数据加载 ==========

        const coverConfig = {
            code:    { icon: 'fa-code',    gradient: 'from-blue-500/30 to-violet-500/30',   iconColor: 'text-blue-300' },
            book:    { icon: 'fa-book',    gradient: 'from-emerald-500/30 to-teal-500/30',  iconColor: 'text-emerald-300' },
            heart:   { icon: 'fa-heart',   gradient: 'from-orange-500/30 to-red-500/30',    iconColor: 'text-orange-300' },
            gear:    { icon: 'fa-gear',    gradient: 'from-gray-500/30 to-gray-400/30',     iconColor: 'text-gray-300' },
            rocket:  { icon: 'fa-rocket',  gradient: 'from-amber-500/30 to-orange-500/30',  iconColor: 'text-amber-300' },
            music:   { icon: 'fa-music',   gradient: 'from-pink-500/30 to-rose-500/30',     iconColor: 'text-pink-300' },
            default: { icon: 'fa-file',    gradient: 'from-blue-500/30 to-violet-500/30',   iconColor: 'text-blue-300' }
        };

        const tagColors = {
            '技术':     'bg-blue-500/20 text-blue-400 border-blue-500/30',
            '学习笔记': 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
            '生活':     'bg-orange-500/20 text-orange-400 border-orange-500/30',
            '杂谈':     'bg-purple-500/20 text-purple-400 border-purple-500/30',
            '项目':     'bg-amber-500/20 text-amber-400 border-amber-500/30',
            '分享':     'bg-pink-500/20 text-pink-400 border-pink-500/30'
        };

        let allPosts = [];
        let activeFilter = 'all';
        let searchQuery = '';

        function getTagClass(tag) {
            return tagColors[tag] || 'bg-gray-500/20 text-gray-400 border-gray-500/30';
        }

        function getCover(cfg) {
            return coverConfig[cfg] || coverConfig['default'];
        }

        function renderPostCard(post) {
            var cover = getCover(post.cover);
            var tagsHtml = (post.tags || []).map(function(tag) {
                return '<span class="px-2 py-0.5 text-xs rounded-full border ' + getTagClass(tag) + '">' + tag + '</span>';
            }).join('');

            return '<article class="post-item glass-card rounded-xl p-5 cursor-pointer">'
                + '  <a href="post.html?slug=' + post.slug + '" class="flex flex-col sm:flex-row sm:items-start gap-4">'
                + '    <div class="flex-shrink-0 w-full sm:w-44 h-28 bg-gradient-to-br ' + cover.gradient + ' rounded-lg flex items-center justify-center">'
                + '      <i class="fa ' + cover.icon + ' text-3xl ' + cover.iconColor + '"></i>'
                + '    </div>'
                + '    <div class="flex-1 min-w-0">'
                + '      <div class="flex items-center flex-wrap gap-2 mb-2">'
                +         tagsHtml
                + '        <span class="text-xs text-gray-600">' + post.date + '</span>'
                + '      </div>'
                + '      <h2 class="text-lg font-semibold text-white mb-1.5">' + post.title + '</h2>'
                + '      <p class="text-gray-500 text-sm line-clamp-2">' + (post.summary || '') + '</p>'
                + '    </div>'
                + '  </a>'
                + '</article>';
        }

        function getFilteredPosts() {
            return allPosts.filter(function(post) {
                var matchFilter = activeFilter === 'all' || (post.tags || []).indexOf(activeFilter) !== -1;
                var q = searchQuery.toLowerCase();
                var matchSearch = !q || (post.title || '').toLowerCase().indexOf(q) !== -1 || (post.summary || '').toLowerCase().indexOf(q) !== -1;
                return matchFilter && matchSearch;
            });
        }

        function renderPosts() {
            var listEl = document.getElementById('posts-list');
            var emptyEl = document.getElementById('empty-state');
            var filtered = getFilteredPosts();

            if (filtered.length === 0) {
                listEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
                return;
            }
            emptyEl.classList.add('hidden');
            listEl.innerHTML = filtered.map(renderPostCard).join('');
        }

        function renderFilters() {
            var bar = document.getElementById('filter-bar');
            var tags = new Set();
            allPosts.forEach(function(p) { (p.tags || []).forEach(function(t) { tags.add(t); }); });
            var tagsArr = Array.from(tags);

            var html = '<button class="filter-btn px-4 py-1.5 rounded-full text-sm border border-white/10 ' + (activeFilter === 'all' ? 'active' : '') + '" data-filter="all">全部</button>';
            tagsArr.forEach(function(tag) {
                html += '<button class="filter-btn px-4 py-1.5 rounded-full text-sm border border-white/10 ' + (activeFilter === tag ? 'active' : '') + '" data-filter="' + tag + '">' + tag + '</button>';
            });
            bar.innerHTML = html;

            bar.querySelectorAll('.filter-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    activeFilter = this.dataset.filter;
                    renderFilters();
                    renderPosts();
                });
            });
        }

        function updateStats() {
            document.getElementById('stat-posts').textContent = allPosts.length;
            var tags = new Set();
            allPosts.forEach(function(p) { (p.tags || []).forEach(function(t) { tags.add(t); }); });
            document.getElementById('stat-tags').textContent = tags.size;

            if (allPosts.length > 0) {
                var sorted = allPosts.slice().sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
                document.getElementById('stat-latest').textContent = sorted[0].date;
                document.getElementById('stat-updated').textContent = sorted[0].date;
            }
        }

        // 加载数据
        fetch('posts/posts.json?t=' + Date.now())
            .then(function(res) {
                if (!res.ok) throw new Error('加载失败');
                return res.json();
            })
            .then(function(posts) {
                allPosts = posts;
                updateStats();
                renderFilters();
                renderPosts();
            })
            .catch(function() {
                document.getElementById('posts-list').innerHTML = '<div class="text-center py-16"><p class="text-gray-500">文章列表加载失败</p></div>';
            });

        // 搜索
        document.getElementById('search-input').addEventListener('input', function(e) {
            searchQuery = e.target.value;
            renderPosts();
        });
    </script>
</body>
</html>
