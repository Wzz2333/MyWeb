<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>文章 | 王一止的博客</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2; object-fit: cover;
        }
        #bg-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
        .nav-glass {
            background: rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .article-card {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.3s;
        }
        /* 透明度调节器 */
        .opacity-panel { position: relative; }
        .opacity-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            min-width: 220px;
            opacity: 0; visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.25s ease;
            z-index: 100;
        }
        .opacity-panel.open .opacity-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .opacity-dropdown label { font-size: 12px; color: #aaa; display: block; margin-bottom: 6px; }
        .opacity-dropdown input[type="range"] {
            width: 100%; accent-color: #6382ff; cursor: pointer;
        }
        .opacity-dropdown .op-row { margin-bottom: 14px; }
        .opacity-dropdown .op-row:last-child { margin-bottom: 0; }
        .opacity-dropdown .op-val { font-size: 11px; color: #93bbfd; float: right; margin-top: -18px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <!-- 背景视频 -->
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="" type="video/mp4">
    </video>
    <div id="bg-overlay"></div>

    <!-- 导航栏 -->
    <header class="fixed top-0 left-0 right-0 nav-glass z-50 py-3">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-5">
                    <a href="blog.html" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                        <i class="fa fa-arrow-left"></i>
                        <span class="hidden sm:inline">返回博客</span>
                    </a>
                    <a href="index.html" class="text-gray-500 hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                        <i class="fa fa-home"></i>
                        <span class="hidden sm:inline">首页</span>
                    </a>
                </div>
                <!-- 透明度调节按钮 -->
                <div class="opacity-panel" id="opacity-panel">
                    <button class="p-2 rounded-lg hover:bg-white/10 transition-colors text-gray-400 hover:text-white" title="调节透明度">
                        <i class="fa fa-adjust"></i>
                    </button>
                    <div class="opacity-dropdown" id="opacity-dropdown">
                        <div class="op-row">
                            <label>遮罩透明度 <span class="op-val" id="ov-val">55%</span></label>
                            <input type="range" id="ov-slider" min="0" max="90" value="55">
                        </div>
                        <div class="op-row">
                            <label>卡片透明度 <span class="op-val" id="card-val">70%</span></label>
                            <input type="range" id="card-slider" min="20" max="95" value="70">
                        </div>
                        <div class="op-row">
                            <label>毛玻璃模糊 <span class="op-val" id="blur-val">16px</span></label>
                            <input type="range" id="blur-slider" min="0" max="40" value="16">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 文章内容 -->
    <main class="pt-20 pb-16">
        <div class="container mx-auto px-6 max-w-3xl">
            <div id="post-content" class="article-card rounded-2xl p-8 md:p-12">
                <div class="text-center py-20">
                    <div class="animate-spin w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                    <p class="text-gray-500">加载中...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <script>
        // ========== 背景视频（与 blog.html 保持一致） ==========
        var bgVideos = [
            { file: '[NK]BITTER-SPICE_live wallpaper.mp4' },
            { file: 'AMY 4K.mp4' },
            { file: 'Chill Cat Coffe.mp4' },
            { file: 'bizhi.mp4' }
        ];
        var bgVideo = document.getElementById('bg-video');
        var savedBg = localStorage.getItem('blog-bg') || 0;
        bgVideo.src = './sources/video/' + bgVideos[savedBg].file;

        // ========== 透明度调节 ==========
        var ovSlider = document.getElementById('ov-slider');
        var cardSlider = document.getElementById('card-slider');
        var blurSlider = document.getElementById('blur-slider');
        var bgOverlay = document.getElementById('bg-overlay');
        var articleCard = document.getElementById('post-content');

        function applyOpacity() {
            var ov = ovSlider.value / 100;
            var card = cardSlider.value / 100;
            var blur = blurSlider.value;
            document.getElementById('ov-val').textContent = Math.round(ov * 100) + '%';
            document.getElementById('card-val').textContent = Math.round(card * 100) + '%';
            document.getElementById('blur-val').textContent = blur + 'px';
            bgOverlay.style.background = 'rgba(0,0,0,' + ov.toFixed(2) + ')';
            localStorage.setItem('blog-ov', ovSlider.value);
            localStorage.setItem('blog-card', cardSlider.value);
            localStorage.setItem('blog-blur', blurSlider.value);
            var blurCSS = blur + 'px';
            articleCard.style.background = 'rgba(20,20,30,' + card.toFixed(2) + ')';
            articleCard.style.backdropFilter = 'blur(' + blurCSS + ')';
            articleCard.style.webkitBackdropFilter = 'blur(' + blurCSS + ')';
            document.querySelectorAll('.nav-glass').forEach(function(el) {
                el.style.backdropFilter = 'blur(' + blurCSS + ')';
                el.style.webkitBackdropFilter = 'blur(' + blurCSS + ')';
            });
        }
        ovSlider.addEventListener('input', applyOpacity);
        cardSlider.addEventListener('input', applyOpacity);
        blurSlider.addEventListener('input', applyOpacity);

        var savedOv = localStorage.getItem('blog-ov');
        var savedCard = localStorage.getItem('blog-card');
        var savedBlur = localStorage.getItem('blog-blur');
        if (savedOv) ovSlider.value = savedOv;
        if (savedCard) cardSlider.value = savedCard;
        if (savedBlur) blurSlider.value = savedBlur;
        applyOpacity();

        document.getElementById('opacity-panel').querySelector('button').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('opacity-panel').classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
            if (!document.getElementById('opacity-panel').contains(e.target)) {
                document.getElementById('opacity-panel').classList.remove('open');
            }
        });

        // 配置 marked
        marked.setOptions({ breaks: true, gfm: true });

        var slug = new URLSearchParams(window.location.search).get('slug');
        var contentEl = document.getElementById('post-content');

        if (!slug) {
            contentEl.innerHTML = '<div class="text-center py-16"><p class="text-gray-500 mb-3">未指定文章</p><a href="blog.html" class="text-blue-400 hover:underline">返回博客列表</a></div>';
        } else {
            fetch('posts/posts.json')
                .then(function(r) { return r.json(); })
                .then(function(posts) {
                    var post = posts.find(function(p) { return p.slug === slug; });
                    if (post) document.title = post.title + ' | 王一止的博客';
                });

            fetch('posts/' + slug + '.md')
                .then(function(r) {
                    if (!r.ok) throw new Error('文章不存在');
                    return r.text();
                })
                .then(function(md) { contentEl.innerHTML = marked.parse(md); })
                .catch(function() {
                    contentEl.innerHTML = '<div class="text-center py-16"><p class="text-gray-500 mb-3">文章加载失败</p><a href="blog.html" class="text-blue-400 hover:underline">返回博客列表</a></div>';
                });
        }
    </script>
</body>
</html>
